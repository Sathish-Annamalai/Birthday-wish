<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Surprise!</title>
    <style>
        body {
            background: radial-gradient(circle, #ffdee9 0%, #b5fffc 100%), 
                        url('https://www.transparenttextures.com/patterns/confetti.png');
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        #display-area {
            text-align: center;
            padding-top: 20px;
            z-index: 10;
            width: 100%;
        }

        .three-d-image {
            width: 100px;
            display: none; 
            margin: 0 auto;
            animation: spin3D 5s infinite linear;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
        }

        /* The 3-Photo Gallery Container */
        #photo-gallery {
            display: none;
            margin: 15px 0;
            justify-content: center;
            flex-wrap: wrap;
        }

        .gallery-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            margin: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            animation: zoomIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes zoomIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes spin3D {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        h1 { 
            color: #d81b60; 
            font-size: 1.8rem; 
            margin: 10px 5px;
            text-shadow: 2px 2px 5px rgba(255,255,255,0.8);
        }

        #selection-panel {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px 0;
            border-radius: 25px 25px 0 0;
            backdrop-filter: blur(10px);
            width: 100%;
            position: fixed;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }

        /* GRID FIX: 3 columns for desktop, 2 for mobile */
        .btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 400px;
            width: 90%;
        }

        @media (max-width: 450px) {
            .btn-group {
                grid-template-columns: repeat(2, 1fr); /* Shows 2 buttons per row on mobile */
            }
            .gallery-img { width: 85px; height: 85px; }
            h1 { font-size: 1.4rem; }
        }

        button {
            padding: 12px 5px;
            font-size: 0.9rem;
            border: 2px solid #d81b60;
            border-radius: 15px;
            cursor: pointer;
            background: white;
            color: #d81b60;
            font-weight: bold;
            transition: 0.3s;
        }

        button:active, button:hover {
            background: #d81b60;
            color: white;
            transform: scale(0.95);
        }

        .balloon {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 60px;
            border-radius: 50%;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            to { transform: translateY(-120vh); opacity: 0; }
        }

        .floatie {
            position: absolute;
            opacity: 0.4;
            animation: floatBack 12s linear infinite;
        }

        @keyframes floatBack {
            0% { transform: translateY(110vh) rotate(0); }
            100% { transform: translateY(-110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <audio id="bday-audio" loop>
        <source src="Bsong.mp3" type="audio/mpeg">
    </audio>

    <div id="display-area">
        <img id="cake-img" src="https://img.icons8.com/plasticine/400/birthday-cake.png" class="three-d-image">
        
        <div id="photo-gallery">
            <img src="Nish3.jpeg" class="gallery-img">
            <img src="Nish1.jpeg" class="gallery-img">
            <img src="Nish2.jpeg" class="gallery-img">
        </div>

        <h1 id="main-wish">Who is the Birthday Star?</h1>
        <p id="sub-text" style="color:#880e4f">Click a name below! 🎁</p>
    </div>

    <div id="selection-panel">
        <div class="btn-group">
            <button onclick="wish('Akhil')">Akhil</button>
            <button onclick="wish('Tejas')">Tejas</button>
            <button onclick="wish('Sathish')">Sathish</button>
            <button onclick="wish('Sivakami')">Sivakami</button>
            <button onclick="wish('Vihan')">Vihan</button>
            <button onclick="wish('Sanjay')">Sanjay</button>
        </div>
    </div>

    <script>
        let partyStarted = false;

        function wish(name) {
            const audio = document.getElementById('bday-audio');
            audio.play().catch(e => console.log("Waiting for interaction"));

            document.getElementById('cake-img').style.display = 'block';
            document.getElementById('photo-gallery').style.display = 'flex';

            let msg = "";

            // Logic for Names (Updated to "Nish")
            if (name === 'Akhil' || name === 'Tejas') {
                msg = "Happy birthday Chittappa!";
            } else if (name === 'Sathish' || name === 'Sivakami') {
                msg = "Happy birthday Nish!";
            } else if (name === 'Vihan') {
                msg = "Happy Birthday Daddy!";
            } else if (name === 'Sanjay') {
                msg = "Happy Birthday Nish Mama!";
            }

            document.getElementById('main-wish').innerText = "🎉 " + msg;
            document.getElementById('sub-text').innerText = "A special wish from " + name + "!";

            if (!partyStarted) {
                setInterval(createBalloon, 500);
                setInterval(createFloatie, 2000);
                partyStarted = true;
            }
            for(let i=0; i<8; i++) setTimeout(createBalloon, i*100);
        }

        function createBalloon() {
            const b = document.createElement('div');
            b.className = 'balloon';
            const colors = ['#ff4081', '#7c4dff', '#00bcd4', '#ffeb3b', '#ff5722'];
            b.style.left = Math.random() * 90 + 'vw';
            b.style.backgroundColor = colors[Math.floor(Math.random()*5)];
            b.style.animationDuration = (Math.random()*2+4)+'s';
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 7000);
        }

        function createFloatie() {
            const icons = ['🎁', '🎂', '✨', '🎈'];
            const f = document.createElement('div');
            f.className = 'floatie';
            f.innerText = icons[Math.floor(Math.random()*4)];
            f.style.left = Math.random() * 90 + 'vw';
            f.style.fontSize = '30px';
            f.style.bottom = '-50px';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 12000);
        }
    </script>
</body>
</html>
